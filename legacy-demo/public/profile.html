<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency profile — PulseTag QR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  body{ background: var(--trust-deep); }
  .pwrap{ max-width: 520px; margin: 0 auto; padding: 40px 20px 70px; }
  .pcard{ background: var(--paper-raised); border-radius: 22px; padding: 30px; }
  .pname{ font-family: var(--font-display); font-size: 1.7rem; color: var(--trust-deep); margin-bottom: 4px; }
  .pbadges{ display:flex; gap:10px; margin: 14px 0 22px; flex-wrap:wrap; }
  .pbadge{ font-family: var(--font-mono); font-size:0.78rem; padding:6px 12px; border-radius:999px; background: var(--paper); border:1px solid var(--line); }
  .pbadge.blood{ background: var(--pulse-dim); color: var(--pulse); border-color: transparent; font-weight:600; }
  .prow{ border-top:1px solid var(--line); padding: 14px 0; }
  .prow .plabel{ font-size:0.78rem; text-transform:uppercase; letter-spacing:.06em; color: var(--ink-soft); font-family: var(--font-mono); margin-bottom:4px; }
  .prow .pval{ font-size:0.98rem; }
  .contact-btn{ display:flex; align-items:center; justify-content:space-between; background: var(--paper); border-radius:12px; padding:12px 14px; margin-top:8px; }
  .contact-btn a{ background: var(--success); color:#fff; padding:8px 14px; border-radius:999px; font-size:0.85rem; font-weight:600; }
  .ai-box{ margin-top: 22px; background: var(--trust-deep); color:#EAF1EE; border-radius:16px; padding:20px; }
  .ai-box .eyebrow{ color:#9FC4BC; }
  .ai-box button{ margin-top:14px; background: var(--pulse); color:#fff; border:none; padding:10px 18px; border-radius:999px; font-weight:600; cursor:pointer; }
  .ai-text{ margin-top:14px; font-size:0.92rem; line-height:1.6; display:none; }
  .loading-text{ font-size:0.85rem; color:#9FC4BC; display:none; margin-top:14px; }
  .topnote{ text-align:center; color:#B9CBC6; font-family: var(--font-mono); font-size:0.78rem; margin-bottom:18px; }
  #notFound{ display:none; color:#fff; text-align:center; padding: 60px 0; }
</style>
</head>
<body>
<div class="pwrap">
  <div class="topnote">SCANNED PROFILE · PULSETAG QR</div>
  <div class="pcard" id="pcard" style="display:none;">
    <div class="pname" id="pName"></div>
    <div class="pbadges" id="pBadges"></div>

    <div class="prow" id="rowAddress" style="display:none;">
      <div class="plabel">Address</div>
      <div class="pval" id="pAddress"></div>
    </div>
    <div class="prow" id="rowConditions" style="display:none;">
      <div class="plabel">Medical conditions</div>
      <div class="pval" id="pConditions"></div>
    </div>

    <div class="prow">
      <div class="plabel">Emergency contact</div>
      <div class="contact-btn">
        <span id="pContact1Name"></span>
        <a id="pContact1Phone" href="#">Call</a>
      </div>
    </div>
    <div class="prow" id="rowContact2" style="display:none;">
      <div class="plabel">Secondary contact</div>
      <div class="contact-btn">
        <span id="pContact2Name"></span>
        <a id="pContact2Phone" href="#">Call</a>
      </div>
    </div>

    <div class="ai-box">
      <span class="eyebrow">AI Emergency Brief · Gemini</span>
      <div style="font-size:0.88rem; color:#B9CBC6; margin-top:6px;">Get a 10-second spoken-style summary of this profile.</div>
      <button id="briefBtn">Generate brief</button>
      <div class="loading-text" id="briefLoading">Reading the profile…</div>
      <div class="ai-text" id="briefText"></div>
    </div>
  </div>
  <div id="notFound">
    <h3 style="color:#fff;">This profile doesn't exist or was removed.</h3>
  </div>
</div>

<script src="/js/profile.js"></script>
</body>
</html>
